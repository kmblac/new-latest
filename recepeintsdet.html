<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Support Request | PsychoFlow</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-50 to-teal-50 min-h-screen app-bg">

<nav class="bg-pink-600 text-white p-3 sm:p-4 shadow-lg">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="font-bold text-lg sm:text-xl">PsychoFlow</div>
            <div class="flex flex-wrap justify-center gap-1 sm:gap-2">
                <a href="dashboard.html" class="nav-link px-3 sm:px-4 py-2 rounded text-sm sm:text-base whitespace-nowrap transition-all duration-300" data-page="dashboard">Dashboard</a>
                <a href="contribution.html" class="nav-link px-3 sm:px-4 py-2 rounded text-sm sm:text-base whitespace-nowrap transition-all duration-300" data-page="contribution">Contribute</a>
                <a href="statistics.html" class="nav-link px-3 sm:px-4 py-2 rounded text-sm sm:text-base whitespace-nowrap transition-all duration-300" data-page="statistics">Statistics</a>
                <a href="luna.html" class="nav-link px-3 sm:px-4 py-2 rounded text-sm sm:text-base whitespace-nowrap transition-all duration-300" data-page="luna">Luna AI</a>
                <a href="login.html" class="nav-link px-3 sm:px-4 py-2 rounded text-sm sm:text-base whitespace-nowrap transition-all duration-300" data-page="login">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-xl mx-auto mt-12 bg-white p-8 rounded-xl shadow-lg">

    <h2 class="text-3xl font-bold text-pink-600 mb-6 text-center">
        Register Support Request
    </h2>

    <form id="recipientForm" class="space-y-4">

        <input type="text" id="name" placeholder="Full Name" required
            class="w-full p-3 border rounded-lg">

        <input type="text" id="location" placeholder="Location" required
            class="w-full p-3 border rounded-lg">

        <textarea id="need" placeholder="Describe your need..." required
            class="w-full p-3 border rounded-lg"></textarea>

        <select id="urgency" required
            class="w-full p-3 border rounded-lg">
            <option value="">Select Urgency Level</option>
            <option value="urgent">🔴 Urgent</option>
            <option value="standard">🟢 Standard</option>
        </select>

        <button type="submit"
            class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700">
            Submit Request
        </button>

    </form>
</div>

<script>
document.getElementById("recipientForm").addEventListener("submit", function(e){
    e.preventDefault();

    const recipient = {
        name: document.getElementById("name").value,
        location: document.getElementById("location").value,
        need: document.getElementById("need").value,
        urgency: document.getElementById("urgency").value
    };

    let recipients = JSON.parse(localStorage.getItem("recipients")) || [];
    recipients.push(recipient);

    localStorage.setItem("recipients", JSON.stringify(recipients));

    window.location.href = "recepients.html";
});
</script>

</body>
</html>
