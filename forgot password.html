<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PsychoFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-teal-100 min-h-screen flex items-center justify-center app-bg">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">Reset Your Password</h2>
    <p class="text-center text-gray-600 mb-6">Enter your email address and we'll send you a reset link.</p>

    <form>
        <input type="email" placeholder="Enter your email" required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
        
        <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700">
            Send Reset Link
        </button>
    </form>

    <div class="text-center mt-4 text-sm">
        <a href="login.html" class="text-teal-600">Back to Login</a>
    </div>
</div>

</body>
</html>
