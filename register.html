<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | PsychoFlow</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem; }
    .auth-card { width:440px; padding:2.5rem; border-radius:var(--r-xl); background:rgba(24,0,24,0.55); border:1px solid var(--border); backdrop-filter:blur(20px); box-shadow:var(--shadow-lg); animation:fadeUp 0.5s ease both; }
    .auth-logo { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; background:linear-gradient(90deg,var(--g1),var(--g2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; margin-bottom:0.4rem; }
    .auth-sub { text-align:center; font-size:0.85rem; color:var(--text-muted); margin-bottom:2rem; }
    .field { margin-bottom:1.1rem; }
    .auth-footer { text-align:center; margin-top:1rem; font-size:0.84rem; color:var(--text-muted); }
    .auth-footer a { color:var(--g2); text-decoration:none; }
    .auth-footer a:hover { color:var(--g1); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">PsychoFlow</div>
  <div class="auth-sub">Create your account</div>

  <form onsubmit="handleRegister(event)">
    <div class="field">
      <label class="pf-label">Full Name</label>
      <input type="text" id="fullName" class="pf-input" placeholder="Jane Doe" required>
    </div>
    <div class="field">
      <label class="pf-label">Email</label>
      <input type="email" id="email" class="pf-input" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label class="pf-label">Password</label>
      <input type="password" id="password" class="pf-input" placeholder="••••••••" required>
    </div>
    <div class="field">
      <label class="pf-label">Confirm Password</label>
      <input type="password" id="confirmPassword" class="pf-input" placeholder="••••••••" required>
    </div>
    <div class="field">
      <label class="pf-label">Role</label>
      <select id="role" class="pf-select pf-input" required>
        <option value="">Select your role…</option>
        <option value="donor">Donor</option>
        <option value="receiver">Receiver</option>
      </select>
    </div>

    <button type="submit" class="btn btn-gold btn-full" style="margin-top:0.5rem;font-size:1rem;padding:0.85rem;">
      Create Account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>

<script>
function handleRegister(e) {
  e.preventDefault()
  const fullName = document.getElementById('fullName').value
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const confirmPassword = document.getElementById('confirmPassword').value
  const role = document.getElementById('role').value
  if (password !== confirmPassword) {
    alert('Passwords do not match')
    return
  }
  
  try {
    // Check if user already exists
    const users = JSON.parse(localStorage.getItem('psychoflow_users')) || []
    const existingUser = users.find(u => u.email === email)
    if (existingUser) {
      alert('User with this email already exists')
      return
    }
    
    // Create new user
    const newUser = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      full_name: fullName,
      email,
      password, // Note: In a real app, this should be hashed
      role,
      created_at: new Date().toISOString()
    }
    
    users.push(newUser)
    localStorage.setItem('psychoflow_users', JSON.stringify(users))
    
    alert('Registration successful!')
    window.location.href = 'index.html'
  } catch (error) {
    console.error('Registration failed:', error)
    alert('Error: Registration failed. Please try again.')
  }
}
</script>

</div>

</body>
</html>
