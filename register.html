<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PsychoFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-teal-100 min-h-screen flex items-center justify-center app-bg">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">Create Account</h2>

   <form action="dashboard.html">
        <input type="text" placeholder="Full Name" required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
        
        <input type="email" placeholder="Email" required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
        
        <input type="password" placeholder="Password" required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
        
        <input type="password" placeholder="Confirm Password" required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
        
        <select required
            class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
            <option value="">Select Your Role</option>
            <option value="donor">Donor</option>
            <option value="receiver">Receiver</option>
        </select>

        <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700">
            Create Account
        </button>
    </form>

    <div class="text-center mt-4 text-sm">
        <p class="text-gray-600">Already have an account? <a href="login.html" class="text-pink-600">Login here</a></p>
    </div>
</div>

</body>
</html>
