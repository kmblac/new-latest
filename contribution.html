<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make a Contribution | PsychoFlow</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .preset-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.5rem; }
    .preset-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text-primary);
      border-radius:var(--r-md); padding:0.9rem 0.5rem; cursor:pointer; font-family:'Syne',sans-serif;
      font-size:0.95rem; font-weight:700; text-align:center; transition:var(--t);
    }
    .preset-btn:hover,.preset-btn.selected {
      background:linear-gradient(135deg,var(--g4),var(--g5));
      border-color:transparent; box-shadow:0 4px 18px rgba(42,17,180,0.4);
    }
    .preset-btn .sub { display:block; font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:400; color:var(--text-muted); margin-top:0.2rem; }
    .preset-btn:hover .sub,.preset-btn.selected .sub { color:rgba(255,255,255,0.7); }
    .amount-display {
      font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; text-align:center;
      background:linear-gradient(90deg,var(--g1),var(--g2)); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; background-clip:text; margin:1rem 0;
    }
    .method-tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    .method-tab {
      flex:1; padding:0.65rem; border-radius:var(--r-md); border:1px solid var(--border);
      background:var(--surface); color:var(--text-secondary); cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; text-align:center; transition:var(--t);
    }
    .method-tab.active {
      background:linear-gradient(135deg,var(--g4),var(--g5)); color:#fff; border-color:transparent;
    }
  </style>
</head>
<body>

<nav class="pf-nav">
  <div class="brand">PsychoFlow</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="contribution.html" class="active">Contribute</a>
    <a href="statistics.html">Statistics</a>
    <a href="management.html">Management</a>
    <a href="luna.html">Luna AI</a>
    <a href="login.html">Logout</a>
  </div>
</nav>

<div class="pf-page" style="max-width:640px;">
  <h1 class="section-title animate-up">Make a Contribution</h1>

  <!-- Recipient banner -->
  <div id="recipientBanner" style="display:none;" class="pf-banner animate-up">
    <strong>Contributing for:</strong> <span id="recipientName"></span>
  </div>

  <div class="glass animate-up delay-1" style="padding:2rem;">
    <!-- Currency -->
    <div style="margin-bottom:1.5rem;">
      <label class="pf-label">Currency</label>
      <select id="currencySelect" class="pf-input pf-select" onchange="updatePresetLabels()">
        <option value="USD">USD – US Dollar</option>
        <option value="EUR">EUR – Euro</option>
        <option value="KES">KES – Kenyan Shilling</option>
        <option value="GBP">GBP – British Pound</option>
      </select>
    </div>

    <!-- Presets -->
    <label class="pf-label">Quick Amounts</label>
    <div class="preset-grid" id="presetButtons">
      <button class="preset-btn" onclick="selectAmount(5,'1 Month',this)" data-amount="5" data-label="1 Month">
        5 <span class="sub">1 Month</span>
      </button>
      <button class="preset-btn" onclick="selectAmount(15,'3 Months',this)" data-amount="15" data-label="3 Months">
        15 <span class="sub">3 Months</span>
      </button>
      <button class="preset-btn" onclick="selectAmount(50,'1 Year',this)" data-amount="50" data-label="1 Year">
        50 <span class="sub">1 Year</span>
      </button>
    </div>

    <!-- Custom amount -->
    <label class="pf-label">Custom Amount</label>
    <input type="number" id="donationAmount" class="pf-input" min="1" step="0.01" value="5"
           oninput="updateAmount(this.value)" style="font-size:1.1rem;text-align:center;margin-bottom:0.5rem;">
    <div class="amount-display"><span id="amountDisplay">5</span> <span id="currencyDisplay">USD</span></div>

    <hr class="divider">

    <!-- Payment method -->
    <label class="pf-label" style="margin-bottom:0.75rem;">Payment Method</label>
    <div class="method-tabs">
      <div class="method-tab active" onclick="setMethod('mpesa',this)">📱 MPESA</div>
      <div class="method-tab" onclick="setMethod('paypal',this)">🅿️ PayPal</div>
      <div class="method-tab" onclick="setMethod('bank',this)">🏦 Bank</div>
    </div>

    <div id="paymentDetails"></div>

    <button class="btn btn-gold btn-full" style="margin-top:1.5rem;padding:1rem;font-size:1rem;" onclick="confirmDonation()">
      Pay Now →
    </button>
  </div>
</div>

<script>
const currencySymbols = { USD:'$', EUR:'€', KES:'KSh ', GBP:'£' };
let currentMethod = 'mpesa';

function selectAmount(amount, label, btn) {
  document.getElementById('donationAmount').value = amount;
  updateAmount(amount);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function updateAmount(val) {
  document.getElementById('amountDisplay').textContent = val;
  document.getElementById('currencyDisplay').textContent = document.getElementById('currencySelect').value;
}

function updatePresetLabels() {
  const currency = document.getElementById('currencySelect').value;
  const sym = currencySymbols[currency] || '';
  document.getElementById('currencyDisplay').textContent = currency;
  document.querySelectorAll('#presetButtons .preset-btn').forEach(btn => {
    const amt = btn.dataset.amount;
    const lab = btn.dataset.label;
    btn.innerHTML = `${sym}${amt} <span class="sub">${lab}</span>`;
  });
}

function setMethod(method, el) {
  currentMethod = method;
  document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('paymentDetails').innerHTML = buildPaymentFields(method);
}

function buildPaymentFields(method) {
  if (method === 'mpesa') return `
    <label class="pf-label">Phone Number (MPESA)</label>
    <input type="tel" id="phone" class="pf-input" placeholder="2547XXXXXXXX" required>`;
  if (method === 'paypal') return `
    <label class="pf-label">PayPal Email</label>
    <input type="email" id="paypalEmail" class="pf-input" placeholder="you@example.com" required>`;
  return `
    <label class="pf-label">Select Bank</label>
    <select id="bankSelect" class="pf-input pf-select" required>
      <optgroup label="Kenyan Banks">
        <option value="equity">Equity Bank</option>
        <option value="kcb">KCB</option>
        <option value="absa">Absa Bank</option>
        <option value="cooperative">Co-operative Bank</option>
        <option value="stanbic">Stanbic Bank</option>
      </optgroup>
      <optgroup label="International Banks">
        <option value="hsbc">HSBC</option><option value="citi">Citi Bank</option>
        <option value="barclays">Barclays</option><option value="wellsfargo">Wells Fargo</option>
        <option value="chase">Chase</option><option value="boa">Bank of America</option>
        <option value="dbs">DBS</option><option value="scotiabank">Scotiabank</option>
        <option value="rbc">RBC</option><option value="ubs">UBS</option>
        <option value="bbva">BBVA</option><option value="sbi">State Bank of India</option>
        <option value="santander">Santander</option><option value="unicredit">UniCredit</option>
        <option value="creditagricole">Crédit Agricole</option><option value="anz">ANZ</option>
      </optgroup>
    </select>
    <label class="pf-label" style="margin-top:1rem;">Card / Account Number</label>
    <input type="text" id="cardNumber" class="pf-input" placeholder="XXXX-XXXX-XXXX-XXXX" required>`;
}

function confirmDonation() {
  const amount = document.getElementById('donationAmount').value;
  const currency = document.getElementById('currencySelect').value;
  const sym = currencySymbols[currency] || '';
  if (currentMethod === 'mpesa') {
    const phone = (document.getElementById('phone') || {}).value?.trim();
    if (!phone) { alert('Please enter your MPESA phone number.'); return; }
    alert(`Initiating MPESA STK push for ${sym}${amount} ${currency} to ${phone}…`);
  } else if (currentMethod === 'paypal') {
    const email = (document.getElementById('paypalEmail') || {}).value?.trim();
    if (!email) { alert('Please enter your PayPal email.'); return; }
    alert(`Redirecting to PayPal to pay ${sym}${amount} ${currency} using ${email}…`);
  } else {
    const bank = (document.getElementById('bankSelect') || {}).value;
    const card = (document.getElementById('cardNumber') || {}).value?.trim();
    if (!bank) { alert('Please select your bank.'); return; }
    if (!card) { alert('Please enter your card/account number.'); return; }
    alert(`Processing bank payment of ${sym}${amount} ${currency} via ${bank}, account ending ${card.slice(-4)}…`);
  }
}

// Read query params
function getQueryParams() {
  const p = {};
  location.search.substring(1).split('&').forEach(pair => {
    const [k,v] = pair.split('=');
    if (k) p[decodeURIComponent(k)] = decodeURIComponent(v||'');
  });
  return p;
}

document.addEventListener('DOMContentLoaded', () => {
  updatePresetLabels();
  setMethod('mpesa', document.querySelector('.method-tab'));
  const qs = getQueryParams();
  if (qs.recipient) {
    document.getElementById('recipientName').textContent = qs.recipient;
    document.getElementById('recipientBanner').style.display = 'block';
  }
});
</script>
</body>
</html>
