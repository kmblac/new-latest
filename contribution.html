<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Contribution</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-teal-50 app-bg">

<nav class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-lg">
    <div class="font-bold text-xl">PsychoFlow</div>
    <div class="space-x-4 flex">
        <a href="index.html" class="hover:bg-pink-700 px-3 py-2 rounded">Dashboard</a>
        <a href="contribution.html" class="hover:bg-pink-700 px-3 py-2 rounded">Contribute</a>
        <a href="statistics.html" class="hover:bg-pink-700 px-3 py-2 rounded">Statistics</a>
        <a href="luna.html" class="hover:bg-pink-700 px-3 py-2 rounded">Luna AI</a>
        <a href="login.html" class="hover:bg-pink-700 px-3 py-2 rounded">Logout</a>
    </div>
</nav>

<div class="max-w-2xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-pink-600 mb-8">Make a Contribution</h1>

    <div id="recipientBanner" style="display:none;" class="bg-red-50 border-l-4 border-red-600 p-4 mb-6 rounded text-gray-800">
        <strong>You are contributing for: </strong><span id="recipientName" class="font-semibold"></span>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
        <label for="currencySelect" class="block font-semibold text-gray-700 mb-3">Currency:</label>
        <select id="currencySelect" onchange="updatePresetLabels();" class="w-full p-3 border rounded-lg mb-6">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="KES">KES</option>
            <option value="GBP">GBP</option>
        </select>

        <h2 class="text-2xl font-bold text-pink-600 mb-4">Select a Preset Amount:</h2>
        <div id="presetButtons" class="flex gap-3 mb-6 flex-wrap">
            <button onclick="selectAmount(5, '1 Month')" data-amount="5" data-label="1 Month" class="bg-pink-600 text-white px-4 py-3 rounded-lg hover:bg-pink-700">5 – 1 Month</button>
            <button onclick="selectAmount(15, '3 Months')" data-amount="15" data-label="3 Months" class="bg-pink-600 text-white px-4 py-3 rounded-lg hover:bg-pink-700">15 – 3 Months</button>
            <button onclick="selectAmount(50, '1 Year')" data-amount="50" data-label="1 Year" class="bg-pink-600 text-white px-4 py-3 rounded-lg hover:bg-pink-700">50 – 1 Year</button>
        </div>

        <h2 class="text-2xl font-bold text-pink-600 mb-4">Or Enter a Custom Amount:</h2>
        <label for="donationAmount" class="block font-semibold text-gray-700 mb-3">Donation Amount: <span id="amountDisplay" class="text-pink-600">5</span> <span id="currencyDisplay" class="text-pink-600">USD</span></label>
        <input type="number" id="donationAmount" min="1" step="0.01" value="5"
               class="w-full mb-6 p-3 border rounded-lg"
               oninput="updateAmount(this.value)" placeholder="Enter amount">

        <label for="paymentMethod" class="block font-semibold text-gray-700 mb-3">Payment Method:</label>
        <select id="paymentMethod" class="w-full p-3 border rounded-lg mb-6" onchange="showPaymentFields()">
            <option value="mpesa">MPESA (Push STK)</option>
            <option value="paypal">PayPal</option>
            <option value="bank">Bank Transfer</option>
        </select>

        <div id="paymentDetails" class="mb-6"></div>

        <button class="w-full bg-teal-600 text-white py-3 rounded-lg hover:bg-teal-700 font-semibold" onclick="confirmDonation()" id="payButton">Pay Now</button>
    </div>
</div>

    <script>
        const currencySymbols = {
            USD: '$',
            EUR: '€',
            KES: 'KSh',
            GBP: '£'
        };

        function selectAmount(amount, label) {
            document.getElementById('donationAmount').value = amount;
            updateAmount(amount);
        }

        function updateAmount(value) {
            document.getElementById('amountDisplay').textContent = value;
            const currency = document.getElementById('currencySelect').value;
            document.getElementById('currencyDisplay').textContent = currency;
        }

        function updatePresetLabels() {
            const currency = document.getElementById('currencySelect').value;
            const symbol = currencySymbols[currency] || '';
            document.getElementById('currencyDisplay').textContent = currency;

            document.querySelectorAll('#presetButtons button').forEach(btn => {
                const amt = btn.getAttribute('data-amount');
                const lab = btn.getAttribute('data-label');
                btn.textContent = symbol + amt + ' – ' + lab;
            });

            updateAmount(document.getElementById('donationAmount').value);
        }

        function showPaymentFields() {
            const method = document.getElementById('paymentMethod').value;
            const container = document.getElementById('paymentDetails');
            container.innerHTML = '';
            if (method === 'mpesa') {
                container.innerHTML = `<label for="phone" class="block font-semibold text-gray-700 mb-2">Phone Number (MPESA):</label>
                    <input type="tel" id="phone" placeholder="2547XXXXXXXX" class="w-full p-3 border rounded-lg" required>`;
            } else if (method === 'paypal') {
                container.innerHTML = `<label for="paypalEmail" class="block font-semibold text-gray-700 mb-2">PayPal Email:</label>
                    <input type="email" id="paypalEmail" placeholder="you@example.com" class="w-full p-3 border rounded-lg" required>`;
            } else if (method === 'bank') {
                container.innerHTML = `<label for="bankSelect" class="block font-semibold text-gray-700 mb-2">Select Bank:</label>
                    <select id="bankSelect" class="w-full p-3 border rounded-lg mb-4" required>
                        <optgroup label="Main Kenyan Banks">
                            <option value="equity">Equity Bank</option>
                            <option value="kcb">KCB</option>
                            <option value="absa">Absa Bank</option>
                            <option value="cooperative">Co-operative Bank</option>
                            <option value="stanbic">Stanbic Bank</option>
                        </optgroup>
                        <optgroup label="Worldwide Banks">
                            <option value="hsbc">HSBC</option>
                            <option value="citi">Citi Bank</option>
                            <option value="barclays">Barclays</option>
                            <option value="wellsfargo">Wells Fargo</option>
                            <option value="chase">Chase</option>
                            <option value="boa">Bank of America</option>
                            <option value="dbs">DBS</option>
                            <option value="scotiabank">Scotiabank</option>
                            <option value="rbc">RBC</option>
                            <option value="ubs">UBS</option>
                            <option value="bbva">BBVA</option>
                            <option value="sbi">State Bank of India</option>
                            <option value="santander">Santander</option>
                            <option value="pnb">PNB</option>
                            <option value="uniCredit">UniCredit</option>
                            <option value="creditagricole">Crédit Agricole</option>
                            <option value="rabobank">Rabobank</option>
                            <option value="anz">ANZ</option>
                        </optgroup>
                    </select>
                    <label for="cardNumber" class="block font-semibold text-gray-700 mb-2">Card/Account Number:</label>
                    <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX" class="w-full p-3 border rounded-lg" required>`;
            }
        }

        function confirmDonation() {
            const amount = document.getElementById('donationAmount').value;
            const currency = document.getElementById('currencySelect').value;
            const method = document.getElementById('paymentMethod').value;
            const symbol = currencySymbols[currency] || '';

            if (method === 'mpesa') {
                const phoneEl = document.getElementById('phone');
                const phone = phoneEl ? phoneEl.value.trim() : '';
                if (!phone) {
                    alert('Please enter your phone number to proceed with MPESA payment.');
                    phoneEl && phoneEl.focus();
                    return;
                }
                alert(`Initiating MPESA STK push for ${symbol}${amount} ${currency} to ${phone}...`);
            } else if (method === 'paypal') {
                const emailEl = document.getElementById('paypalEmail');
                const email = emailEl ? emailEl.value.trim() : '';
                if (!email) {
                    alert('Please enter your PayPal email to continue.');
                    emailEl && emailEl.focus();
                    return;
                }
                alert(`Redirecting to PayPal to pay ${symbol}${amount} ${currency} using ${email}...`);
            } else if (method === 'bank') {
                const bankEl = document.getElementById('bankSelect');
                const cardEl = document.getElementById('cardNumber');
                const bank = bankEl ? bankEl.value : '';
                const card = cardEl ? cardEl.value.trim() : '';
                if (!bank) {
                    alert('Please select your bank before proceeding.');
                    bankEl && bankEl.focus();
                    return;
                }
                if (!card) {
                    alert('Please enter your card or account number to continue.');
                    cardEl && cardEl.focus();
                    return;
                }
                alert(`Processing bank payment of ${symbol}${amount} ${currency} via ${bank}, card/account ${card}...`);
            }
        }

        // parse query parameters
        function getQueryParams() {
            const params = {};
            location.search.substring(1).split('&').forEach(pair => {
                const [key, value] = pair.split('=');
                if (key) params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            });
            return params;
        }

        function showRecipient() {
            const qs = getQueryParams();
            if (qs.recipient) {
                document.getElementById('recipientName').textContent = qs.recipient;
                document.getElementById('recipientBanner').style.display = 'block';
            }
        }

        // initialize labels on load
        document.addEventListener('DOMContentLoaded', () => {
            updatePresetLabels();
            showRecipient();
            showPaymentFields();
        });
    </script>
</body>
</html>
