<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | PsychoFlow</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-teal-100 min-h-screen flex items-center justify-center app-bg">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">Login</h2>

    <form action="index.html">
        <input type="email" placeholder="Email" required
            class="w-full mb-4 p-3 border rounded-lg">

        <input type="password" placeholder="Password" required
            class="w-full mb-4 p-3 border rounded-lg">

        <button class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700">
            Login
        </button>
    </form>

    <div class="text-center mt-4 text-sm">
        <a href="forgot%20password.html" class="text-teal-600">Forgot Password?</a><br>
        <a href="register.html" class="text-pink-600">Create Account</a>
    </div>
</div>

</body>
</html>
