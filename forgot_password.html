<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | PsychoFlow</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-card { width:420px; padding:2.5rem; border-radius:var(--r-xl); background:rgba(24,0,24,0.55); border:1px solid var(--border); backdrop-filter:blur(20px); box-shadow:var(--shadow-lg); animation:fadeUp 0.5s ease both; }
    .auth-logo { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; background:linear-gradient(90deg,var(--g1),var(--g2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; margin-bottom:0.4rem; }
    .auth-sub { text-align:center; font-size:0.85rem; color:var(--text-muted); margin-bottom:2rem; }
    .field { margin-bottom:1.1rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.84rem; }
    .auth-footer a { color:var(--g2); text-decoration:none; }
    .auth-footer a:hover { color:var(--g1); }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">PsychoFlow</div>
  <div class="auth-sub">Reset your password — we'll send you a link.</div>

  <form>
    <div class="field">
      <label class="pf-label">Email Address</label>
      <input type="email" class="pf-input" placeholder="you@example.com" required>
    </div>
    <button type="submit" class="btn btn-gold btn-full" style="font-size:1rem;padding:0.85rem;">
      Send Reset Link
    </button>
  </form>

  <div class="auth-footer">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

</body>
</html>
