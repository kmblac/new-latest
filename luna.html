<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna AI | PsychoFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --rose: #e8476a;
            --rose-dark: #c73058;
            --rose-light: #fde8ed;
            --teal: #2ab7a9;
            --teal-light: #e0f5f3;
            --text: #1a1a2e;
            --muted: #6b7280;
            --bg: #fdf6f8;
            --white: #ffffff;
            --shadow: 0 4px 24px rgba(232,71,106,0.10);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 20%, rgba(232,71,106,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 90% 80%, rgba(42,183,169,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: relative;
            z-index: 10;
            background: var(--white);
            border-bottom: 1px solid rgba(232,71,106,0.12);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 1px 12px rgba(232,71,106,0.06);
        }
        .nav-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            color: var(--rose);
            letter-spacing: -0.5px;
        }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: var(--rose-light);
            color: var(--rose);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 2.5rem auto;
            padding: 0 1.5rem 3rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.75rem;
        }
        .luna-avatar {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--rose), var(--teal));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 0 0 4px var(--rose-light);
            flex-shrink: 0;
            animation: pulse-ring 3s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 4px var(--rose-light); }
            50%       { box-shadow: 0 0 0 8px rgba(232,71,106,0.08); }
        }
        .header-text h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.75rem;
            color: var(--rose);
            line-height: 1.1;
        }
        .header-text p {
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }
        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--teal);
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%,100%{opacity:1} 50%{opacity:0.3}
        }

        .chat-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow), 0 1px 3px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid rgba(232,71,106,0.08);
        }

        #chat-box {
            height: 440px;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(232,71,106,0.2); border-radius: 4px; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--muted);
            gap: 0.75rem;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .empty-state .big-emoji { font-size: 2.5rem; }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; max-width: 280px; }
        .empty-prompts { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
        .empty-prompt-btn {
            background: var(--rose-light);
            color: var(--rose);
            border: none;
            border-radius: 20px;
            padding: 0.45rem 1rem;
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .empty-prompt-btn:hover { background: var(--rose); color: white; }

        .msg { display: flex; align-items: flex-end; gap: 0.6rem; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }
        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .msg.luna .msg-avatar { background: linear-gradient(135deg, var(--rose), var(--teal)); }
        .msg.user .msg-avatar { background: var(--rose-light); }

        .msg-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .msg.luna .msg-bubble {
            background: var(--teal-light);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .msg.user .msg-bubble {
            background: var(--rose);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.error .msg-bubble { background: #fde8e8; color: #c0392b; }

        .typing-bubble {
            display: flex; align-items: center; gap: 4px;
            padding: 0.75rem 1rem;
        }
        .typing-dot {
            width: 7px; height: 7px;
            background: var(--teal);
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)}
        }

        .input-area {
            padding: 1rem 1.25rem;
            border-top: 1px solid rgba(232,71,106,0.08);
            display: flex;
            gap: 0.75rem;
            align-items: center;
            background: var(--bg);
        }
        #messageInput {
            flex: 1;
            padding: 0.75rem 1.1rem;
            border: 1.5px solid rgba(232,71,106,0.15);
            border-radius: 40px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        #messageInput:focus { border-color: var(--rose); }
        #messageInput::placeholder { color: #b0b7c3; }

        #sendBtn {
            width: 46px; height: 46px;
            background: var(--rose);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #sendBtn:hover { background: var(--rose-dark); transform: scale(1.05); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #sendBtn svg { width: 20px; height: 20px; }

        .api-notice {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #92400e;
            line-height: 1.5;
        }
        .api-notice strong { display: block; margin-bottom: 0.2rem; }
        .api-notice a { color: var(--rose); }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">PsychoFlow</div>
    <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="contribution.html">Contribute</a>
        <a href="statistics.html">Statistics</a>
        <a href="luna.html" class="active">Luna AI</a>
        <a href="login.html">Logout</a>
    </div>
</nav>

<div class="page">
    <div class="header">
        <div class="luna-avatar">🌙</div>
        <div class="header-text">
            <h1>Luna AI Companion</h1>
            <p><span class="status-dot"></span>Powered by Groq · Always here for you</p>
        </div>
    </div>

    <div class="chat-card">
        <div id="chat-box">
            <div class="empty-state" id="emptyState">
                <div class="big-emoji">💬</div>
                <p>Hi, I'm Luna. I'm here to listen and support you. What's on your mind today?</p>
                <div class="empty-prompts">
                    <button class="empty-prompt-btn" onclick="usePrompt(this)">I've been feeling anxious lately</button>
                    <button class="empty-prompt-btn" onclick="usePrompt(this)">Help me with stress management</button>
                    <button class="empty-prompt-btn" onclick="usePrompt(this)">I need someone to talk to</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Share what's on your mind…" autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    

<script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────
    // Get your FREE key at: https://console.groq.com/keys
    const GROQ_API_KEY  ="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";
    const GROQ_MODEL = "llama-3.3-70b-versatile";

    const SYSTEM_PROMPT = `You are Luna, a warm and compassionate AI mental health companion built into PsychoFlow.
Your role is to:
- Provide empathetic, non-judgmental emotional support
- Help users explore their feelings and thoughts
- Offer evidence-based coping strategies and psychoeducation
- Gently encourage professional help when appropriate
- Never diagnose or replace professional therapy

Keep responses concise (2-4 short paragraphs max), warm, and human. Use plain language, not clinical jargon.`;

    // ─── STATE ────────────────────────────────────────────────────────────────
    const conversationHistory = [];

    // ─── DOM ──────────────────────────────────────────────────────────────────
    const chatBox    = document.getElementById('chat-box');
    const input      = document.getElementById('messageInput');
    const sendBtn    = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    function usePrompt(btn) {
        input.value = btn.textContent.trim();
        sendMessage();
    }

    function clearEmpty() {
        if (emptyState && emptyState.parentNode) emptyState.remove();
    }

    function appendMessage(role, text, isError = false) {
        clearEmpty();
        const wrapper = document.createElement('div');
        wrapper.className = `msg ${role === 'user' ? 'user' : 'luna'}${isError ? ' error' : ''}`;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? '🧑' : '🌙';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;

        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        clearEmpty();
        const wrapper = document.createElement('div');
        wrapper.className = 'msg luna';
        wrapper.id = 'typing-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '🌙';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble typing-bubble';
        bubble.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;

        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing-indicator');
        if (t) t.remove();
    }

    // ─── SEND ─────────────────────────────────────────────────────────────────
    async function sendMessage() {
        const text = input.value.trim();
        if (!text || sendBtn.disabled) return;

        input.value = '';
        sendBtn.disabled = true;

        appendMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });

        showTyping();

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [
                        { role: 'system', content: SYSTEM_PROMPT },
                        ...conversationHistory
                    ],
                    max_tokens: 600,
                    temperature: 0.75
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || `API error ${response.status}`);
            }

            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content
                ?? "I'm sorry, I couldn't generate a response. Please try again.";

            conversationHistory.push({ role: 'assistant', content: reply });

            removeTyping();
            appendMessage('luna', reply);

        } catch (err) {
            console.error('Luna error:', err);
            removeTyping();
            appendMessage('luna', `Something went wrong: ${err.message}. Please check your API key and try again.`, true);
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
</script>
</body>
</html>
