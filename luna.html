<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna AI | PsychoFlow</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .luna-header { display:flex; align-items:center; gap:1.25rem; margin-bottom:1.75rem; }
    .luna-avatar {
      width:56px; height:56px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--g4),var(--g5));
      display:flex; align-items:center; justify-content:center; font-size:1.6rem;
      box-shadow:0 0 0 4px rgba(250,229,8,0.15);
      animation:pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100%{box-shadow:0 0 0 4px rgba(250,229,8,0.15);}
      50%{box-shadow:0 0 0 10px rgba(250,229,8,0.04);}
    }
    .luna-title { font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800; background:linear-gradient(90deg,var(--g1),var(--g2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .luna-sub { font-size:0.82rem; color:var(--text-muted); margin-top:0.2rem; display:flex; align-items:center; gap:0.4rem; }
    .status-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:blink 2s infinite; display:inline-block; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    .chat-wrap { display:flex; flex-direction:column; height:520px; }
    #chat-box { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; scroll-behavior:smooth; }
    #chat-box::-webkit-scrollbar{width:3px;}
    #chat-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}

    .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:0.75rem; color:var(--text-muted); padding:2rem; }
    .empty-prompts { display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem; }
    .prompt-chip { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text-secondary); border-radius:99px; padding:0.45rem 1.1rem; font-size:0.8rem; font-family:'DM Sans',sans-serif; cursor:pointer; transition:var(--t); }
    .prompt-chip:hover { background:rgba(250,229,8,0.12); border-color:rgba(250,229,8,0.3); color:var(--g1); }

    .msg { display:flex; align-items:flex-end; gap:0.6rem; animation:msgIn 0.3s ease; }
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user { flex-direction:row-reverse; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
    .msg.luna .msg-avatar { background:linear-gradient(135deg,var(--g4),var(--g5)); }
    .msg.user .msg-avatar { background:rgba(255,255,255,0.1); border:1px solid var(--border); }
    .msg-bubble { max-width:75%; padding:0.75rem 1rem; border-radius:18px; font-size:0.88rem; line-height:1.6; }
    .msg.luna .msg-bubble { background:rgba(255,255,255,0.07); border:1px solid var(--border); color:var(--text-primary); border-bottom-left-radius:4px; }
    .msg.user .msg-bubble { background:linear-gradient(135deg,var(--g4),var(--g5)); color:#fff; border-bottom-right-radius:4px; }
    .msg.error .msg-bubble { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; }

    .typing-bubble { display:flex; align-items:center; gap:4px; padding:0.75rem 1rem; }
    .typing-dot { width:7px; height:7px; background:var(--g3); border-radius:50%; animation:typingBounce 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    .input-area { padding:0.75rem 1rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; align-items:center; }
    #messageInput { flex:1; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:99px; padding:0.65rem 1.1rem; color:var(--text-primary); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:var(--t); }
    #messageInput::placeholder{color:var(--text-muted);}
    #messageInput:focus{border-color:rgba(250,229,8,0.4);background:rgba(255,255,255,0.09);}
    #sendBtn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--g4),var(--g5)); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:var(--t); }
    #sendBtn:hover{transform:scale(1.08);box-shadow:0 4px 18px rgba(42,17,180,0.5);}
    #sendBtn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
    #sendBtn svg{width:18px;height:18px;}
  </style>
</head>
<body>

<nav class="pf-nav">
  <div class="brand">PsychoFlow</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="contribution.html">Contribute</a>
    <a href="statistics.html">Statistics</a>
    <a href="management.html">Management</a>
    <a href="luna.html" class="active">Luna AI</a>
    <a href="login.html">Logout</a>
  </div>
</nav>

<div class="pf-page" style="max-width:760px;">
  <div class="luna-header animate-up">
    <div class="luna-avatar">🌙</div>
    <div>
      <div class="luna-title">Luna AI Companion</div>
      <div class="luna-sub"><span class="status-dot"></span> Powered by Groq · Always here for you</div>
    </div>
  </div>

  <div class="glass animate-up delay-1" style="overflow:hidden;">
    <div class="chat-wrap">
      <div id="chat-box">
        <div class="empty-state" id="emptyState">
          <div style="font-size:2rem;">💬</div>
          <p style="font-size:0.9rem;line-height:1.6;max-width:280px;">Hi, I'm Luna. I'm here to listen and support you. What's on your mind today?</p>
          <div class="empty-prompts">
            <button class="prompt-chip" onclick="usePrompt(this)">I've been feeling anxious lately</button>
            <button class="prompt-chip" onclick="usePrompt(this)">Help me with stress management</button>
            <button class="prompt-chip" onclick="usePrompt(this)">I need someone to talk to</button>
          </div>
        </div>
      </div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Share what's on your mind…" autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const GROQ_API_KEY = "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";
const GROQ_MODEL   = 'meta-llama/llama-4-scout-17b-16e-instruct';
const SYSTEM_PROMPT = `You are Luna, a warm and compassionate AI mental health companion built into PsychoFlow.
Your role is to:
- Provide empathetic, non-judgmental emotional support
- Help users explore their feelings and thoughts
- Offer evidence-based coping strategies and psychoeducation
- Gently encourage professional help when appropriate
- Never diagnose or replace professional therapy
Keep responses concise (2-4 short paragraphs max), warm, and human. Use plain language, not clinical jargon.`;

const conversationHistory = [];
const chatBox  = document.getElementById('chat-box');
const input    = document.getElementById('messageInput');
const sendBtn  = document.getElementById('sendBtn');
const emptyEl  = document.getElementById('emptyState');

function usePrompt(btn) { input.value = btn.textContent.trim(); sendMessage(); }

function clearEmpty() { if(emptyEl && emptyEl.parentNode) emptyEl.remove(); }

function appendMessage(role, text, isError=false) {
  clearEmpty();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role==='user'?'user':'luna'}${isError?' error':''}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role==='user'?'🧑':'🌙';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(avatar); wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  clearEmpty();
  const wrap = document.createElement('div');
  wrap.className = 'msg luna'; wrap.id = 'typing-indicator';
  const av = document.createElement('div'); av.className='msg-avatar'; av.textContent='🌙';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(av); wrap.appendChild(bubble);
  chatBox.appendChild(wrap); chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() { const t=document.getElementById('typing-indicator'); if(t)t.remove(); }

async function sendMessage() {
  const text = input.value.trim();
  if(!text || sendBtn.disabled) return;
  input.value = ''; sendBtn.disabled = true;
  appendMessage('user', text);
  conversationHistory.push({role:'user',content:text});
  showTyping();
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_API_KEY}`},
      body: JSON.stringify({model:GROQ_MODEL, messages:[{role:'system',content:SYSTEM_PROMPT},...conversationHistory], max_tokens:600, temperature:0.75})
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err?.error?.message||`API error ${res.status}`);}
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? "I'm sorry, I couldn't generate a response. Please try again.";
    conversationHistory.push({role:'assistant',content:reply});
    removeTyping(); appendMessage('luna',reply);
  } catch(err) {
    console.error('Luna error:',err);
    removeTyping(); appendMessage('luna',`Something went wrong: ${err.message}`,true);
  } finally {
    sendBtn.disabled = false; input.focus();
  }
}

input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
</script>
</body>
</html>
